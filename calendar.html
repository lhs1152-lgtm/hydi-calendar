<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>휴가 신청 캘린더</title>
    <!-- Telegram Web App 스크립트 -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            text-align: center;
        }
        h2 {
            margin-bottom: 5px;
        }
        .subtitle {
            font-size: 13px;
            color: var(--tg-theme-hint-color, #888888);
            margin-bottom: 20px;
        }
        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-top: 10px;
        }
        .day-header {
            font-weight: bold;
            font-size: 14px;
            padding: 5px;
        }
        .day {
            padding: 15px 5px;
            border-radius: 8px;
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            cursor: pointer;
            transition: 0.2s;
            font-size: 16px;
        }
        .day:active {
            transform: scale(0.95);
        }
        .day.selected {
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            font-weight: bold;
        }
        .month-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: bold;
        }
        .nav-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: var(--tg-theme-button-color, #3390ec);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>🏖️ 여름 휴가 신청 달력</h2>
    <div class="subtitle">원하는 휴가 날짜를 터치하세요. (다중 선택 가능)</div>

    <div class="month-header">
        <button class="nav-btn" onclick="prevMonth()">◀</button>
        <span id="monthDisplay">2026년 8월</span>
        <button class="nav-btn" onclick="nextMonth()">▶</button>
    </div>

    <div class="calendar" id="calendar">
        <!-- Calendar will be generated here -->
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // 화면을 꽉 차게 켬

        let currentDate = new Date();
        let selectedDates = new Set(); // 'YYYY-MM-DD' 형식 보관

        const calendarEl = document.getElementById('calendar');
        const monthDisplay = document.getElementById('monthDisplay');

        function renderCalendar() {
            calendarEl.innerHTML = '';
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            monthDisplay.innerText = `${year}년 ${month + 1}월`;

            const days = ['일', '월', '화', '수', '목', '금', '토'];
            days.forEach(day => {
                const el = document.createElement('div');
                el.className = 'day-header';
                el.innerText = day;
                calendarEl.appendChild(el);
            });

            const firstDayIndex = new Date(year, month, 1).getDay();
            const lastDay = new Date(year, month + 1, 0).getDate();

            // 빈 칸 채우기
            for (let i = 0; i < firstDayIndex; i++) {
                const el = document.createElement('div');
                calendarEl.appendChild(el);
            }

            // 날짜 렌더링
            for (let i = 1; i <= lastDay; i++) {
                const el = document.createElement('div');
                el.className = 'day';
                el.innerText = i;
                
                // YYYY-MM-DD 포맷
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                
                if (selectedDates.has(dateStr)) {
                    el.classList.add('selected');
                }

                el.onclick = () => {
                    if (selectedDates.has(dateStr)) {
                        selectedDates.delete(dateStr);
                        el.classList.remove('selected');
                    } else {
                        selectedDates.add(dateStr);
                        el.classList.add('selected');
                    }
                    updateMainButton();
                };
                
                calendarEl.appendChild(el);
            }
        }

        function prevMonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        }

        function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        }

        function updateMainButton() {
            if (selectedDates.size > 0) {
                tg.MainButton.setText(`총 ${selectedDates.size}일 휴가 신청하기`);
                tg.MainButton.show();
            } else {
                tg.MainButton.hide();
            }
        }

        // 제출 버튼(MainButton) 클릭 이벤트
        Telegram.WebApp.onEvent('mainButtonClicked', function() {
            // 선택된 날짜 배열을 오름차순으로 정렬
            let datesArray = Array.from(selectedDates).sort();
            let data = {
                action: 'submit_vacation',
                dates: datesArray
            };
            
            // 봇으로 데이터 전송 후 앱 닫기
            tg.sendData(JSON.stringify(data));
        });

        // 초기 렌더링
        renderCalendar();
    </script>
</body>
</html>
